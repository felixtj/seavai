name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, curl, zip, gd, fileinfo

      - name: Write CI .env
        working-directory: laravel
        run: |
          echo "APP_NAME=Seavai" >> .env
          echo "APP_ENV=local" >> .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=/tmp/ci.sqlite" >> .env
          touch /tmp/ci.sqlite

      - name: Install Composer dependencies
        working-directory: laravel
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy laravel/ to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./laravel/
          server-dir: /domains/bigwavedigital.com.au/public_html/seavai/laravel/
          exclude: |
            **/.git*
            **/.env
            **/tests/**
            **/storage/logs/*
            **/storage/framework/views/*
            **/storage/framework/cache/*
            **/storage/framework/sessions/*
            **/.DS_Store
            **/node_modules/**
            **/package.json
            **/vite.config.js

      - name: Deploy public_html/ to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./public_html/
          server-dir: /domains/bigwavedigital.com.au/public_html/seavai/public_html/
          exclude: |
            **/.DS_Store
